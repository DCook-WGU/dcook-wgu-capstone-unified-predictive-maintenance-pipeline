# ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- 
# Services
# ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- 
services:

  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  # PostgreSQL Database Server
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----
  postgres:
    image: postgres:16
    container_name: dcook_capstone_postgres
    environment:
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # Persistent Database Data
      - postgres_data:/var/lib/postgresql/data
      # Make Data folder visible
      - ./data:/data
      # Optional: Initialization Scripts
      # - ./infrastructure/postgres/initdb:/docker-entrypoint-initdb.d

      # Mount Host Systems Configurations for Timezone
      #- /etc/localtime:/etc/localtime:ro
      #- /etc/timezone:/etc/timezone:ro
    networks:
      - capstone_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  # Database Bootstrap
  # Creates schemas, roles, grants, core tables, and runtime control rows.
  # Safe to run repeatedly.
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  db_bootstrap:
    image: postgres:16
    container_name: dcook_capstone_db_bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      CAPSTONE_SCHEMA: ${CAPSTONE_SCHEMA:-capstone}
      SYNTHETIC_DATASET_ID: ${SYNTHETIC_DATASET_ID:-pump_synthetic_v1}
      SYNTHETIC_RUN_ID: ${SYNTHETIC_RUN_ID:-synthetic_run_001}

      KAFKA_TOPIC: ${KAFKA_TOPIC}

      KAFKA_PRODUCER_DB_USER: ${KAFKA_PRODUCER_DB_USER}
      KAFKA_PRODUCER_DB_PASSWORD: ${KAFKA_PRODUCER_DB_PASSWORD}
      KAFKA_INGEST_DB_USER: ${KAFKA_INGEST_DB_USER}
      KAFKA_INGEST_DB_PASSWORD: ${KAFKA_INGEST_DB_PASSWORD}

      PRODUCER_QUEUE_TABLE: ${PRODUCER_QUEUE_TABLE:-synthetic_sensor_messages_send_queue}
      PRODUCER_CONTROL_TABLE: ${PRODUCER_CONTROL_TABLE:-simulation_state_control}
      CONSUMER_TARGET_TABLE: ${CONSUMER_TARGET_TABLE:-synthetic_sensor_messages_consumed_stage}

      PRODUCER_BATCH_SIZE: ${PRODUCER_BATCH_SIZE:-5200}
      PRODUCER_POLL_SECONDS: ${PRODUCER_POLL_SECONDS:-0.0}
      MAX_SEND_ATTEMPTS: ${MAX_SEND_ATTEMPTS:-3}
    volumes:
      - ./infrastructure/postgres/bootstrap:/bootstrap:ro
    networks:
      - capstone_net
    command: ["bash", "/bootstrap/run_bootstrap.sh"]
    restart: "no"

  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  # PostgreSQL PGAdmin GUI
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dcook_capstone_pgadmin
    environment:
      TZ: ${TZ:-UTC}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-UTC}

      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

      # Mount Host Systems Configurations for Timezone
      #- /etc/localtime:/etc/localtime:ro
      #- /etc/timezone:/etc/timezone:ro
    networks:
      - capstone_net

  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----   
  # KAFKA / KRaft
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----    
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dcook_capstone_kafka
    depends_on: []
    ports:
      - "9092:9092"
    environment:

      # Timezone configuration
      TZ: ${TZ:-UTC}

      # --- KRaft core settings ---
      KAFKA_KRAFT_MODE: "true"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # --- Listeners (broker & controller) ---
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # --- Cluster ID ---
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      CLUSTER_ID: ${CLUSTER_ID}
      # Generated with 'docker run --rm confluentinc/cp-kafka:7.6.1 kafka-storage random-uuid'

      # --- Broker configs ---
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      # KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    networks:
      - capstone_net
    volumes:
    # For presistence
      - kafka_data:/var/lib/kafka/data
      
      # Mount Host Systems Configurations for Timezone
      #- /etc/localtime:/etc/localtime:ro
      #- /etc/timezone:/etc/timezone:ro

    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 30s


  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----   
  # KAFKA TOPIC INIT
  # Creates required Kafka topics after broker is healthy.
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  

  kafka_topic_init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dcook_capstone_kafka_topic_init
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_TOPIC_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
    networks:
      - capstone_net
    command:
      - bash
      - -lc
      - |
        echo "[kafka-topic-init] Waiting for Kafka at $${KAFKA_BOOTSTRAP_SERVERS}..."

        kafka-broker-api-versions \
          --bootstrap-server "$${KAFKA_BOOTSTRAP_SERVERS}" \
          >/dev/null 2>&1

        echo "[kafka-topic-init] Creating topic if missing: $${KAFKA_TOPIC}"

        kafka-topics \
          --bootstrap-server "$${KAFKA_BOOTSTRAP_SERVERS}" \
          --create \
          --if-not-exists \
          --topic "$${KAFKA_TOPIC}" \
          --partitions "$${KAFKA_TOPIC_PARTITIONS}" \
          --replication-factor "$${KAFKA_TOPIC_REPLICATION_FACTOR}"

        echo "[kafka-topic-init] Topic description:"
        kafka-topics \
          --bootstrap-server "$${KAFKA_BOOTSTRAP_SERVERS}" \
          --describe \
          --topic "$${KAFKA_TOPIC}"

        echo "[kafka-topic-init] Complete."
    restart: "no"

    ## Double $$ on purpose. Using Double $$ keeps Docker Compose from substituting in the variable too early and allows the containers to read the environment variable at runtime.


  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  # APP
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        ENV_NAME: capstone
        ENV_FILE: /app/environment.yml
    # Important to allow producers can reuse this service for scaling
    image: dcook_capstone_app:latest
    container_name: dcook_capstone_app
    depends_on:
      postgres:
        condition: service_healthy
      db_bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka_topic_init:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./:/workspace
      # main code for the container
      - ./app:/app
      # mount data directory for streaming / EDA / etc.
      - ./data:/data
      # mount docs folder for easier assess to resource documentation
      - ./docs:/docs
      # mount models folder
      - ./models:/models
      # mount notebooks folder
      - ./notebooks:/notebooks
      # mount sql folder
      - ./sql:/sql
      # mount utility folder
      - ./utils:/utils
      # Mount W&B Folder
      - ./wandb:/app/wandb
      # Mount Infrastructure Folder
      - ./infrastructure:/infrastructure
      # Mount Kafka Folder
      - ./infrastructure/kafka:/kafka
      
      # Mount Host Systems Configurations for Timezone
      #- /etc/localtime:/etc/localtime:ro
      #- /etc/timezone:/etc/timezone:ro
    environment:

      # Timezone configuration
      # Set in .env. Example: America/New_York, America/Chicago, America/Los_Angeles
      TZ: ${TZ:-UTC}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-UTC}
      
      # Database Connection for my producers/consumers
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # Kafka bootstrap (Needs to match the advertised listener hostname)
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      # conda env name from Dockerfile
      ENV_NAME: ${ENV_NAME}

      # Adding Utility Folder to the Environmental PythonPath to allow for easy import
      PYTHONPATH: ${PYTHONPATH}

      # W&B writes run data from inside container
      WANDB_DIR: /app/wandb

    working_dir: /workspace

    networks:
      - capstone_net
    command: ["bash", "-lc", "sleep infinity"]
    # ---- ---- ---- ---- ---- ---- ---- ----  
    # GPU 
    # ---- ---- ---- ---- ---- ---- ---- ----  
    #deploy:
    #    resources:
    #      reservations:
    #        devices:
    #          - driver: nvidia
    #            count: 1
    #            capabilities: [gpu]


  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----   
  # PRODUCERS: 
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  

  # Water Pump
  # Water Pump Producer - All Data -- Normal and Abnormal
  producer_water_pump_synthetic:
    image: dcook_capstone_app:latest
    container_name: producer_water_pump_synthetic
    depends_on:
      kafka:
        condition: service_healthy
      kafka_topic_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      db_bootstrap:
        condition: service_completed_successfully

    env_file:
      - .env
    volumes:
      - ./:/workspace
      # main code for the container
      - ./app:/app
      # mount data directory for streaming / EDA / etc.
      - ./data:/data
      # Mount the streaming data directory
      - ./data/stream:/stream
      # Mount the Infrastructure Main Folder
      - ./infrastructure:/infrastructure
      # Mount the Kafka Service Infrastructure Folder
      - ./infrastructure/kafka:/kafka

      # Mount Host Systems Configurations for Timezone
      #- /etc/localtime:/etc/localtime:ro
      #- /etc/timezone:/etc/timezone:ro
    working_dir: /workspace
    environment:

      # Timezone configuration
      # Set in .env. Example: America/New_York, America/Chicago, America/Los_Angeles
      TZ: ${TZ:-UTC}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-UTC}

      ENV_NAME: ${ENV_NAME}
      PYTHONPATH: ${PYTHONPATH}

      # Database connection (same as app)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${KAFKA_PRODUCER_DB_USER}
      DB_PASSWORD: ${KAFKA_PRODUCER_DB_PASSWORD}

      # Variables
      #DATASET_NAME: WATER_PUMP
      DATASET_ID: ${SYNTHETIC_DATASET_ID:-pump_synthetic_v1}
      RUN_ID: ${SYNTHETIC_RUN_ID:-synthetic_run_001}
      #RUN_ID: premelt_run_001

      # Producer Details
      PRODUCER_SCHEMA: capstone
      PRODUCER_QUEUE_TABLE: synthetic_sensor_messages_send_queue
      PRODUCER_CONTROL_TABLE: simulation_state_control
      PRODUCER_WORKER_ID: producer_worker_001

      # Kafka
      KAFKA_CLIENT_ID: synthetic-telemetry-producer
      #STREAM_MODE: normal
      #ANOMALY_RATE: "0.0"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}


    command: ["python", "-m", "infrastructure.kafka.producers.run_water_pump_synthetic_producer"]
    networks:
      - capstone_net
  
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- 

  # # Water Pump
  # # Water Pump Producer - Normal Data
  # producer_water_pump_normal:
  #   image: dcook_capstone_app:latest
  #   container_name: dcook_capstone_producer_wp_normal
  #   depends_on:
  #     - kafka
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./app:/app
  #     - ./data:/data
  #     - ./data/stream:/stream
  #   environment:
  #     ENV_NAME: capstone
  #     DATASET_NAME: WATER_PUMP
  #     STREAM_MODE: normal
  #     ANOMALY_RATE: "0.0"
  #     KAFKA_BOOTSTRAP_SERVERS: dcook_capstone_kafka:9092
  #     KAFKA_TOPIC: water_pump_stream
  #   command: ["python", "-m", "src.streaming.producers.water_pump_producer"]
  #   networks:
  #     - capstone_net
  
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- 

  # # Water Pump Producer - Abnormal/Mixed Data
  # producer_water_pump_mixed:
  #   image: dcook_capstone_app:latest
  #   container_name: dcook_capstone_producer_wp_mixed
  #   depends_on:
  #     - kafka
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./app:/app
  #     - ./data:/data
  #     - ./data/stream:/stream
  #   environment:
  #     ENV_NAME: capstone
  #     DATASET_NAME: WATER_PUMP
  #     STREAM_MODE: mixed
  #     # Currently set to 10% of rows will contain anomalies
  #     ANOMALY_RATE: "0.1"
  #     KAFKA_BOOTSTRAP_SERVERS: dcook_capstone_kafka:9092
  #     KAFKA_TOPIC: water_pump_stream
  #   command: ["python", "-m", "src.streaming.producers.water_pump_producer"]
  #   networks:
  #     - capstone_net

  # Kafka resources:
    # https://kafka.apache.org/quickstart
    # https://www.datacamp.com/tutorial/kafka-docker-explained
    # https://medium.com/@wiraizkandar/kafka-producer-consumer-in-local-docker-with-go-02759d20fde6
    # https://needablackcoffee.medium.com/learn-apache-kafka-with-these-python-examples-454b5275109e
    # https://dev.to/boyu1997/intro-to-kafka-4hn2
    # https://medium.com/@erkndmrl/kafka-cluster-with-docker-compose-5864d50f677e

  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----   
  # Consumer
  # ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
  db_consumer:
    image: dcook_capstone_app:latest
    #container_name: dcook_capstone_db_consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka_topic_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      db_bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./:/workspace
      # main code for the container
      - ./app:/app
      # mount data directory for streaming / EDA / etc.
      - ./data:/data
      # Mount the Infrastructure Main Folder
      - ./infrastructure:/infrastructure
      # Mount the Kafka Service Infrastructure Folder
      - ./infrastructure/kafka:/kafka
      
      # Mount Host Systems Configurations for Timezone
      #- /etc/localtime:/etc/localtime:ro
      #- /etc/timezone:/etc/timezone:ro
    working_dir: /workspace
      
    environment:

      # Timezone configuration
      # Set in .env. Example: America/New_York, America/Chicago, America/Los_Angeles
      TZ: ${TZ:-UTC}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-UTC}
      
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-pump.telemetry.synthetic}

      CONSUMER_SCHEMA: ${CAPSTONE_SCHEMA:-capstone}
      CONSUMER_TARGET_TABLE: ${CONSUMER_TARGET_TABLE:-synthetic_sensor_messages_consumed_stage}

      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-synthetic-telemetry-consumer-group}
      KAFKA_CONSUMER_MAX_MESSAGES: ${CONSUMER_MAX_MESSAGES:-26000}
      KAFKA_CONSUMER_POLL_TIMEOUT_SECONDS: ${CONSUMER_POLL_TIMEOUT_SECONDS:-5.0}
      KAFKA_CONSUMER_AUTO_OFFSET_RESET: ${CONSUMER_AUTO_OFFSET_RESET:-earliest}
      KAFKA_CONSUMER_STOP_ON_EMPTY: ${CONSUMER_STOP_ON_EMPTY:-true}
      KAFKA_CONSUMER_IDLE_SLEEP_SECONDS: ${CONSUMER_IDLE_SLEEP_SECONDS:-0.0}
      KAFKA_CONSUMER_PROGRESS_LOG_EVERY_BATCHES: ${CONSUMER_PROGRESS_LOG_EVERY_BATCHES:-10}

      KAFKA_CONSUMER_INSERT_CHUNK_SIZE: ${CONSUMER_INSERT_CHUNK_SIZE:-5000}
  
      PYTHONPATH: ${PYTHONPATH}
      # Kafka connection


      # Database connection (same as app)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${KAFKA_INGEST_DB_USER}
      DB_PASSWORD: ${KAFKA_INGEST_DB_PASSWORD}

      # Conda env name used inside the container
      ENV_NAME: ${ENV_NAME}
    
    scale: 3

    command:
      [
        "/bin/bash",
        "-lc",
        "export SYNTHETIC_CONSUMER_WORKER_ID=$$(hostname); export KAFKA_CONSUMER_WORKER_ID=$$(hostname); exec /opt/miniconda/envs/capstone/bin/python -m infrastructure.kafka.consumers.run_kafka_db_consumer"
      ]
    networks:
      - capstone_net
    # Uncomment to add GPU support for real-time ML inference, Stretch-goal or later addition
    #deploy:
    #resources:
    #  reservations:
    #    devices:
    #      - driver: nvidia
    #        count: 1
    #        capabilities: ["gpu"]


# ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----   
# Volumes
# ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
volumes:
  postgres_data:
    name: dcook_capstone_postgres_data

  pgadmin_data:
    name: dcook_capstone_pgadmin_data

  kafka_data:
    name: dcook_capstone_kafka_data


# ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----   
# Networks 
# ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ---- ----  
networks:
  capstone_net:
    name: dcook_capstone_net
    driver: bridge