gold_baseline:
  layer_name: gold
  recipe_id: gold_modeling__v001_baseline

  versions:
    gold: gold__modeling__baseline__v001
    truth: truth_v001

  process_run_id_prefix: gold_baseline_process

  default_fallbacks:
    asset_id: asset__001
    run_id: run__001


  artifact_layout:
    stage: gold
    family: baseline
    subdirs:
      - models
      - scores
      - thresholds
      - summaries
      - metadata
      - config
      - lineage

  random_seed: 42
  train_fraction: 0.7
  use_robust_scaler: false
  baseline_threshold_percentile: 97.0
  stage1_threshold_percentile: 95.0
  stage2_threshold_percentile: 97.0
  baseline_estimator_count: 200