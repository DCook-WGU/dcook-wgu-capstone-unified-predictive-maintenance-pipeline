synthetic:
  layer_name: "synthetic"
  process_run_id_prefix: "synthetic"
  random_seed: 42

  # batch sizes
  normal_batch_size: 50

  # Mode
  generator:
    mode: "batch"
    target_rows: 50000
    max_episodes: 1000000
    episode_max_rows: 24000
    allow_overshoot: false
    rows_per_failure: 28000
    write_mode: "reset"
    append_mode: "renumber"

  # episode defaults
  episode:
    normal_before_range: [2200, 3200] 
    buildup_range: [8000, 10500]
    failure_range: [1, 1]

    recovery_range: [1950, 2850]
    normal_after_range: [400, 1000]
    magnitude_range: [0.55, 1.50]
    buildup_fraction: 0.20

  # fault selection behavior
  faults:
    allowed:
      - drift_up
      - drift_down
      - spike
      - stuck_constant
      - variance_burst
      - step_shift
      - intermittent_dropout
      - sawtooth
    random_mode_probability: 0.30
    multisensor_probability: 0.25

  # artifact keys expected in the parent Silver EDA truth (or fallback paths)
  silver_eda_artifact_keys:
    profile_normal: "feature_profile_normal_clean_path"
    profile_abnormal: "feature_profile_abnormal_path"
    profile_recovery: "feature_profile_recovery_path"
    corr_pairs_normal: "sensor_correlation_pairs_normal_clean_path"
    group_map_normal: "sensor_group_map_normal_clean_path"
    fault_pairings_normal: "sensor_fault_pairings_normal_path"
    hotspot_clusters_normal: "sensor_correlation_hotspot_clusters_normal_clean_path"

  output_mode: "postgres_batch"

  postgres:
    schema: "capstone"
    table_artifact_name: "stream"

  export:
    enabled: true
    export_dir_key: "artifacts_root"

  kafka:
    enabled: false
    topic: "synthetic_pump"
    checkpoint_table: "synthetic_pump_kafka_checkpoint"

  calibration:
    enabled: true
    mean_within_k_std: 1.00
    std_ratio_bounds: [0.90, 1.35]

  #correlation_hotspot_clusters: []
  correlation_hotspot_clusters:
  - ["sensor_14", "sensor_16"]
  - ["sensor_17", "sensor_18"]
  - ["sensor_19", "sensor_20", "sensor_21", "sensor_22", "sensor_23", "sensor_24", "sensor_25"]
  - ["sensor_25", "sensor_26"]
  - ["sensor_31", "sensor_32", "sensor_33"]
  - ["sensor_34", "sensor_35", "sensor_36"]
  - ["sensor_40", "sensor_43"]
  - ["sensor_41", "sensor_42"]
  - ["sensor_00", "sensor_04"]

  correlation_cluster_derivation:
    enabled: true
    min_abs_corr: 0.20
    top_n_pairs: 80
    min_cluster_size: 2
    max_cluster_size: 8

  fault_excluded_sensors:
    - sensor_15
    - sensor_50

  correlation_tuning:

    family_split_rules:
      chain_cluster_avg_abs_corr_threshold: 0.76


    normal:
      top_pairwise_overlay:
        strength: 0.18
        top_n: 220
        min_abs_corr: 0.05
        smooth_alpha: 0.95

      named_cluster_overlay:
        strength: 0.20
        smooth_alpha: 0.97

      anchor_cluster_generation:
        blend: 0.92
        min_abs_corr: 0.06
        residual_floor: 0.018
        smooth_alpha: 0.97

      bridge_pair_generation:
#        bridge_pairs: []
        bridge_pairs:
          - ["sensor_08", "sensor_09"]
          - ["sensor_14", "sensor_16"]
          - ["sensor_17", "sensor_18"]
          - ["sensor_19", "sensor_20"]
          - ["sensor_20", "sensor_21"]
          - ["sensor_21", "sensor_22"]
          - ["sensor_22", "sensor_23"]
          - ["sensor_23", "sensor_24"]
          - ["sensor_24", "sensor_25"]
          - ["sensor_25", "sensor_26"]
          - ["sensor_31", "sensor_32"]
          - ["sensor_32", "sensor_33"]
          - ["sensor_34", "sensor_35"]
          - ["sensor_35", "sensor_36"]
          - ["sensor_40", "sensor_43"]
          - ["sensor_41", "sensor_42"]
          - ["sensor_00", "sensor_04"]
        blend: 0.94
        min_abs_corr: 0.05
        residual_floor: 0.012
        smooth_alpha: 0.985

      family_overrides:
        tight_pair:
          named_cluster_overlay:
            strength: 0.22
            smooth_alpha: 0.98
          anchor_cluster_generation:
            blend: 0.95
            min_abs_corr: 0.04
            residual_floor: 0.012
            smooth_alpha: 0.98

        strong_chain_cluster:
          named_cluster_overlay:
            strength: 0.22
