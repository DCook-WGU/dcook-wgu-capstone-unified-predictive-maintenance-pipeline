synthetic:
  layer_name: "synthetic"
  process_run_id_prefix: "synthetic"
  random_seed: 42

  # batch sizes
  normal_batch_size: 50

  # Mode
  generator:
    mode: "batch"
    target_rows: 225000
    max_episodes: 1000000
    episode_max_rows: 12000
    allow_overshoot: false
    rows_per_failure: 135000
    write_mode: "reset"
    append_mode: "renumber"

  # episode defaults
  episode:
    normal_before_range: [800, 1800]
    buildup_range: [650, 1100]
    failure_range: [1, 1]

    recovery_range: [1450, 2000]
    normal_after_range: [250, 700]
    magnitude_range: [0.75, 2.0]
    buildup_fraction: 0.20

  # fault selection behavior
  faults:
    allowed:
      - drift_up
      - drift_down
      - spike
      - stuck_constant
      - variance_burst
      - step_shift
      - intermittent_dropout
      - sawtooth
    random_mode_probability: 0.30
    multisensor_probability: 0.25

  # artifact keys expected in the parent Silver EDA truth (or fallback paths)
  silver_eda_artifact_keys:
    profile_normal: "feature_profile_normal_path"
    profile_abnormal: "feature_profile_abnormal_path"
    profile_recovery: "feature_profile_recovery_path"
    corr_pairs_normal: "sensor_correlation_pairs_normal_path"
    group_map_normal: "sensor_group_map_normal_path"
    fault_pairings_normal: "sensor_fault_pairings_normal_path"
    hotspot_clusters_normal: "sensor_correlation_hotspot_clusters_normal_path"

  output_mode: "postgres_batch"

  postgres:
    schema: "capstone"
    table_artifact_name: "stream"

  export:
    enabled: true
    export_dir_key: "artifacts_root"

  kafka:
    enabled: false
    topic: "synthetic_pump"
    checkpoint_table: "synthetic_pump_kafka_checkpoint"

  calibration:
    enabled: true
    mean_within_k_std: 1.00
    std_ratio_bounds: [0.90, 1.35]

  correlation_hotspot_clusters:
    - ["sensor_08", "sensor_09"]
    - ["sensor_14", "sensor_16"]
    - ["sensor_17", "sensor_18"]
    - ["sensor_19", "sensor_20", "sensor_21", "sensor_22", "sensor_23", "sensor_24", "sensor_25"]
    - ["sensor_31", "sensor_32", "sensor_33"]
    - ["sensor_34", "sensor_35", "sensor_36"]

  correlation_cluster_derivation:
    enabled: false
    min_abs_corr: 0.20
    top_n_pairs: 80
    min_cluster_size: 2
    max_cluster_size: 8

  fault_excluded_sensors:
    - sensor_15
    - sensor_50

  correlation_tuning:
    family_split_rules:
      chain_cluster_avg_abs_corr_threshold: 0.76


    normal:
      top_pairwise_overlay:
        strength: 0.18
        top_n: 140
        min_abs_corr: 0.08
        smooth_alpha: 0.91
      named_cluster_overlay:
        strength: 0.16
        smooth_alpha: 0.94
      anchor_cluster_generation:
        blend: 0.90
        min_abs_corr: 0.15
        residual_floor: 0.04
        smooth_alpha: 0.94
      bridge_pair_generation:
        bridge_pairs:
          - ["sensor_08", "sensor_09"]
          - ["sensor_14", "sensor_16"]
          - ["sensor_17", "sensor_18"]
          - ["sensor_19", "sensor_20"]
          - ["sensor_25", "sensor_26"]
          - ["sensor_31", "sensor_32"]
          - ["sensor_32", "sensor_33"]
          - ["sensor_34", "sensor_35"]
          - ["sensor_35", "sensor_36"]
        blend: 0.973
        min_abs_corr: 0.08
        residual_floor: 0.008
        smooth_alpha: 0.985

      family_overrides:
        tight_pair:
          named_cluster_overlay:
            strength: 0.32
            smooth_alpha: 0.982
          anchor_cluster_generation:
            blend: 0.994
            min_abs_corr: 0.05
            residual_floor: 0.006
            smooth_alpha: 0.986

        strong_chain_cluster:
          named_cluster_overlay:
            strength: 0.24
            smooth_alpha: 0.970
          anchor_cluster_generation:
            blend: 0.980
            min_abs_corr: 0.08
            residual_floor: 0.012
            smooth_alpha: 0.980

        weak_chain_cluster:
          named_cluster_overlay:
            strength: 0.22
            smooth_alpha: 0.965
          anchor_cluster_generation:
            blend: 0.970
            min_abs_corr: 0.08
            residual_floor: 0.018
            smooth_alpha: 0.975

        dense_cluster:
          named_cluster_overlay:
            strength: 0.20
            smooth_alpha: 0.955
          anchor_cluster_generation:
            blend: 0.930
            min_abs_corr: 0.10
            residual_floor: 0.035
            smooth_alpha: 0.960

      priority_pair_generation:
        enabled: true
        pair_specs:
          - anchor_sensor: "sensor_08"
            member_sensor: "sensor_09"
            blend: 0.998
            min_abs_corr: 0.05
            residual_floor: 0.004
            smooth_alpha: 0.990

          - anchor_sensor: "sensor_14"
            member_sensor: "sensor_16"
            blend: 0.997
            min_abs_corr: 0.05
            residual_floor: 0.004
            smooth_alpha: 0.989

          - anchor_sensor: "sensor_17"
