            blend: 0.997
            min_abs_corr: 0.05
            residual_floor: 0.004
            smooth_alpha: 0.989

          - anchor_sensor: "sensor_19"
            member_sensor: "sensor_20"
            blend: 0.994
            min_abs_corr: 0.05
            residual_floor: 0.006
            smooth_alpha: 0.987

          - anchor_sensor: "sensor_34"
            member_sensor: "sensor_35"
            blend: 0.996
            min_abs_corr: 0.05
            residual_floor: 0.005
            smooth_alpha: 0.988

    recovery:
