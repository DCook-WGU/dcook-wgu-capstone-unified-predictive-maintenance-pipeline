          - ["sensor_35", "sensor_36"]
        blend: 0.980
        min_abs_corr: 0.08
        residual_floor: 0.015
        smooth_alpha: 0.976

      family_overrides:
        tight_pair:
          named_cluster_overlay:
            strength: 0.26
            smooth_alpha: 0.968
          anchor_cluster_generation:
            blend: 0.970
            min_abs_corr: 0.05
