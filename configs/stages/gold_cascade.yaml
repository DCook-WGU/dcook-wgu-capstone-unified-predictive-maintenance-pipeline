gold_cascade:
  layer_name: gold
  recipe_id: gold_modeling__v001_cascade

  versions:
    gold: gold__modeling__cascade__v001
    truth: truth_v001

  process_run_id_prefix: gold_cascade_process

  artifact_layout:
    stage: gold
    subdirs:
      - models
      - scores
      - thresholds
      - profiles
      - evidence
      - row_tracking
      - tuning
      - plots
      - summaries
      - metadata
      - config
      - lineage

    variants:
      default:
        family: cascade_defaults
      tuned:
        family: cascade_tuned
      stage3_improved:
        family: cascade_stage3_improved

  random_seed: 42

  stage1:
    estimator_count: 200
    threshold_percentile: 95.0

  stage2:
    selection_mode: parameter_search
    min_recall: 0.5
    random_state: 42

    fixed:
      params:
        n_estimators: 300
        max_samples: auto
        contamination: auto
        max_features: 1.0
        bootstrap: false
      threshold_percentile: 99.0
      warning_threshold_percentile: 98.0
      confirmed_threshold_percentile: 99.0

    search:
      threshold_grid:
        - 98.5
        - 99.0
        - 99.25
        - 99.5
        - 99.75
        - 99.9
        - 99.95

      param_grid:
        n_estimators:
          - 100
          - 200
          - 300
        max_samples:
          - auto
          - 0.8
          - 1.0
        contamination:
          - auto
          - 0.005
          - 0.01
        max_features:
          - 1.0
        bootstrap:
          - false

  stage3:
    min_primary_sensor_hits: 2
    min_secondary_sensor_hits: 1
    rolling_window_size: 3
    minimum_flags_in_window: 2

    stage3_tuning_grid:
      min_weighted_score:
        - 3.25
        - 3.5
        - 3.75
        - 4.0
        - 4.25
      rolling_window_size:
        - 3
        - 5
      minimum_flags_in_window:
        - 2
        - 3
      strong_primary_hits:
        - 2
        - 3
      drift_threshold_multiplier:
        - 1.0
        - 1.25
        - 1.5