bronze:
  layer_name: bronze
  stage_name: ingestion

  process_run_id_prefix: bronze_process

  versions:
    silver: bronze__ingestion__v001
    truth: truth_v001

  default_fallbacks:
    asset_id: asset__001
    run_id: run__001

  artifact_layout:
    stage: bronze
    family: null
    subdirs:
      - profiles
      - quality
      - schema
      - summaries
      - metadata
      - config
      - lineage
  
  dataset_candidates: [meta__dataset_name, meta__source_dataset, meta__dataset]
  add_record_id: true 
  record_id_inputs:
    - meta__source_file
    - meta__source_row_id
  record_id_method: hash_pandas_object_uint64